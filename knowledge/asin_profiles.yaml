# ASIN-Specific Profiles
# Tribal knowledge about individual products
#
# Focus on hero SKUs and problematic ASINs

profiles:

  # Example ASIN - replace with your actual ASINs
  B00EXAMPLE:
    title: "Example Product Name"
    gl: GL_EXAMPLE
    
    importance: hero  # hero, standard, long_tail
    revenue_share: 0.30  # % of GL revenue
    
    sensitivities:
      - "CVR very sensitive to Prime badge — loses 40% conversion without it"
      - "Price floor is $X — below that, margin goes negative"
      - "Buy Box loss = immediate traffic drop"
      
    historical_issues:
      - date: 2025-01-15
        issue: "Brief description of what happened"
        impact: "Lost $XK GMS over Y weeks"
        resolution: "What fixed it"
        
    notes:
      - "Add product-specific nuances"
      - "E.g., 'Highly seasonal: 3x volume in Q4'"
      - "E.g., 'Competitor launched knockoff — monitor closely'"
      - "E.g., 'Review rating dropped after supplier change'"

# Add your actual ASINs below:
#
# B00ABC123:
#   title: "Your Product Name"
#   gl: GL3
#   importance: hero
#   ...
