# Metric definitions used in WBR
metrics:
  shipped_gms:
    name: "Shipped GMS"
    description: "Gross Merchandise Sales — topline revenue"
    unit: "currency"
    direction: "up_good"

  shipped_units:
    name: "Shipped Units"
    description: "Volume of units sold"
    unit: "count"
    direction: "up_good"

  net_ppm:
    name: "Net PPM"
    description: "Net Pure Product Margin = (GMS - PCOGS) / GMS"
    formula: "(gms - pcogs) / gms"
    unit: "percent"
    direction: "up_good"

  asp:
    name: "ASP"
    description: "Average Selling Price = GMS / Units"
    formula: "gms / units"
    unit: "currency"
    direction: "neutral"  # Higher isn't always better

  pcogs_per_unit:
    name: "PCOGS/u"
    description: "Product Cost of Goods Sold per Unit"
    formula: "pcogs / units"
    unit: "currency"
    direction: "down_good"

  ctc:
    name: "CTC"
    description: "Contribution to Change — % attribution to total delta"
    unit: "percent"
    direction: "neutral"


# Comparison periods used
periods:
  yoy: "Year over Year (primary lens)"
  wow: "Week over Week (secondary lens)"
