# Causal Rules — If-Then Heuristics
# These help the agent generate hypotheses for root cause analysis
#
# Format:
#   - id: unique identifier
#     trigger: what metric movement triggers this rule
#     check: what to look for to confirm
#     explanation: human-readable hypothesis
#     confidence: how often this explanation is correct (0-1)
#     applies_to: [all] or list of GLs

rules:

  # === CVR (Conversion Rate) Rules ===
  
  - id: cvr_asp_inverse
    trigger:
      metric: cvr
      direction: down
    check:
      metric: asp
      direction: up
      same_period: true
    explanation: >
      CVR often drops when ASP increases — customers are price-sensitive. 
      Check if price changes were intentional or due to promo expiration.
    confidence: 0.85
    applies_to: [all]

  - id: cvr_buy_box_loss
    trigger:
      metric: cvr
      direction: down
    check:
      metric: buy_box_pct
      direction: down
    explanation: >
      Lost Buy Box significantly reduces conversion. Check competitor pricing 
      and our offer price vs. competition.
    confidence: 0.90
    applies_to: [all]

  - id: cvr_shipping_delay
    trigger:
      metric: cvr
      direction: down
    check:
      metric: shipping_estimate_days
      direction: up
    explanation: >
      Longer delivery estimates reduce conversion — customers want fast shipping.
      Check inventory levels by FC region.
    confidence: 0.80
    applies_to: [all]

  - id: cvr_inventory_regionalization
    trigger:
      metric: cvr
      direction: down
    check:
      condition: "in_stock_rate > 95% AND shipping_estimate_days > 5"
    explanation: >
      High in-stock but slow shipping suggests inventory is concentrated in 
      distant FCs — this is a regionalization issue. Customers see "delivery 
      in 5-7 days" instead of Prime 2-day.
    confidence: 0.75
    applies_to: [all]

  - id: cvr_negative_reviews
    trigger:
      metric: cvr
      direction: down
    check:
      metric: negative_review_count_7d
      threshold: ">= 3"
    explanation: >
      Multiple negative reviews in a short period tanks CVR. Check review 
      content for product defects or fulfillment issues.
    confidence: 0.75
    applies_to: [all]

  - id: cvr_rating_drop
    trigger:
      metric: cvr
      direction: down
    check:
      metric: star_rating
      direction: down
      threshold: ">= 0.2"
    explanation: >
      Star rating dropped significantly — likely due to recent negative reviews.
      Review content for actionable issues.
    confidence: 0.80
    applies_to: [all]

  - id: cvr_content_change
    trigger:
      metric: cvr
      direction: down
      threshold: ">= 0.10"  # 10%+ drop
    check:
      condition: "no_other_obvious_cause"
    explanation: >
      If CVR dropped with no obvious pricing/inventory/review issue, check 
      for listing changes: A+ content removed, images changed, bullet points 
      edited, or listing suppression.
    confidence: 0.60
    applies_to: [all]

  - id: cvr_low_quality_traffic
    trigger:
      metric: cvr
      direction: down
    check:
      metric: glance_views
      direction: up
      same_period: true
    explanation: >
      Traffic up but CVR down often means low-quality traffic — likely from 
      broad-match PPC campaigns or external traffic that doesn't convert.
    confidence: 0.70
    applies_to: [all]

  # === Traffic (Glance Views) Rules ===

  - id: traffic_search_rank_loss
    trigger:
      metric: glance_views
      direction: down
      threshold: ">= 0.10"
    check:
      metric: organic_search_rank
      direction: down
    explanation: >
      Traffic drops often correlate with organic search rank loss. Check 
      keyword positions for main keywords.
    confidence: 0.85
    applies_to: [all]

  - id: traffic_ad_spend_cut
    trigger:
      metric: glance_views
      direction: down
    check:
      metric: ad_spend
      direction: down
      same_period: true
    explanation: >
      Traffic dropped with ad spend — paid traffic reduction is the cause.
      Was this intentional or budget cap hit?
    confidence: 0.90
    applies_to: [all]

  - id: traffic_listing_suppression
    trigger:
      metric: glance_views
      direction: down
      threshold: ">= 0.30"  # 30%+ sudden drop
    check:
      condition: "sharp_single_day_drop"
    explanation: >
      Sudden sharp traffic drop suggests listing suppression. Check Listing 
      Quality Dashboard for policy violations, stranded inventory, or 
      compliance issues.
    confidence: 0.75
    applies_to: [all]

  - id: traffic_competitor_launch
    trigger:
      metric: glance_views
      direction: down
    check:
      condition: "gradual_decline_over_2_weeks"
    explanation: >
      Gradual traffic decline may indicate new competitor gaining share. 
      Check for new entrants with aggressive pricing or advertising.
    confidence: 0.60
    applies_to: [all]

  # === Buy Box Rules ===

  - id: buy_box_competitor_price
    trigger:
      metric: buy_box_pct
      direction: down
    check:
      metric: price_vs_competition
      condition: "our_price > competitor_price"
    explanation: >
      Lost Buy Box due to competitor undercutting on price. Check if this 
      is sustainable for them or a temporary promo.
    confidence: 0.90
    applies_to: [all]

  - id: buy_box_shipping_speed
    trigger:
      metric: buy_box_pct
      direction: down
    check:
      condition: "our_price competitive AND competitor_has_prime"
    explanation: >
      Price is competitive but lost Buy Box — competitor may have faster 
      shipping (Prime vs non-Prime, or same-day vs 2-day).
    confidence: 0.70
    applies_to: [all]

  # === NPPM (Margin) Rules ===

  - id: nppm_storage_fees_q4
    trigger:
      metric: nppm
      direction: down
      period: [oct, nov, dec]
    check:
      metric: storage_fees
      direction: up
    explanation: >
      Q4 storage fees spike due to peak season surcharges — this is expected.
      Ensure inventory planning accounts for this.
    confidence: 0.95
    applies_to: [all]

  - id: nppm_return_rate_spike
    trigger:
      metric: nppm
      direction: down
    check:
      metric: return_rate
      direction: up
      threshold: ">= 0.02"  # 2pp increase
    explanation: >
      Return rate spike eroding margin. Check for product defect reports, 
      shipping damage, or listing accuracy issues.
    confidence: 0.80
    applies_to: [all]

  - id: nppm_promo_compression
    trigger:
      metric: nppm
      direction: down
    check:
      metric: gms
      direction: up
      same_period: true
    explanation: >
      GMS up but NPPM down — we're buying growth with discounts/promos. 
      Check coupon and deal activity.
    confidence: 0.85
    applies_to: [all]

  - id: nppm_cogs_increase
    trigger:
      metric: nppm
      direction: down
    check:
      metric: pcogs
      direction: up
      threshold: ">= 0.05"
    explanation: >
      PCOGS increased — check for supplier cost changes, freight increases, 
      or FBA fee tier changes (product dimensions).
    confidence: 0.80
    applies_to: [all]

  - id: nppm_ad_spend_inefficiency
    trigger:
      metric: nppm
      direction: down
    check:
      metric: tacos
      direction: up
      threshold: ">= 0.02"
    explanation: >
      Advertising cost of sale increased — ads are less efficient. Check 
      for ROAS degradation, wasted spend, or competitor bid pressure.
    confidence: 0.75
    applies_to: [all]

  # === GMS Rules ===

  - id: gms_prime_day_hangover
    trigger:
      metric: gms
      direction: down
      period: [july_week_3, july_week_4, oct_week_3, oct_week_4]
    check:
      condition: "prime_day was within 14 days"
    explanation: >
      Post-Prime Day demand pull-forward — customers bought early, expect 
      2-3 week recovery period.
    confidence: 0.85
    applies_to: [all]

  - id: gms_oos_hero_sku
    trigger:
      metric: gms
      direction: down
      threshold: ">= 0.15"
    check:
      metric: in_stock_rate
      direction: down
      asin_level: true
    explanation: >
      Check if a hero SKU went out of stock — single ASINs can drive large 
      GL-level swings.
    confidence: 0.80
    applies_to: [all]

