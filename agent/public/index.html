<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leadership Autopilot</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1e293b;
      padding: 1rem 2rem;
      border-bottom: 1px solid #334155;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #f8fafc;
    }

    .status {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .status-item {
      background: #334155;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
    }

    .status-item.active {
      background: #3b82f6;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .message {
      max-width: 80%;
      padding: 1rem 1.5rem;
      border-radius: 1rem;
      line-height: 1.6;
    }

    .message.user {
      background: #3b82f6;
      align-self: flex-end;
      border-bottom-right-radius: 0.25rem;
    }

    .message.assistant {
      background: #1e293b;
      align-self: flex-start;
      border-bottom-left-radius: 0.25rem;
    }

    .message.assistant pre {
      background: #0f172a;
      padding: 1rem;
      border-radius: 0.5rem;
      overflow-x: auto;
      margin: 1rem 0;
    }

    .message.assistant code {
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 0.875rem;
    }

    .message.assistant table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
      font-size: 0.875rem;
    }

    .message.assistant th,
    .message.assistant td {
      padding: 0.5rem;
      border: 1px solid #334155;
      text-align: left;
    }

    .message.assistant th {
      background: #0f172a;
    }

    .message.assistant h2, .message.assistant h3 {
      margin-top: 1.5rem;
      margin-bottom: 0.75rem;
      color: #f8fafc;
    }

    .message.assistant h2:first-child, .message.assistant h3:first-child {
      margin-top: 0;
    }

    .message.assistant ul, .message.assistant ol {
      margin-left: 1.5rem;
      margin-top: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .message.assistant li {
      margin: 0.25rem 0;
    }

    .message.assistant strong {
      color: #f8fafc;
    }

    .message.assistant blockquote {
      border-left: 3px solid #3b82f6;
      padding-left: 1rem;
      margin: 1rem 0;
      color: #94a3b8;
    }

    /* Collapsible WHY section */
    .why-section {
      margin-top: 1rem;
      border: 1px solid #334155;
      border-radius: 0.5rem;
      overflow: hidden;
    }

    .why-toggle {
      width: 100%;
      padding: 0.75rem 1rem;
      background: #0f172a;
      border: none;
      color: #94a3b8;
      font-size: 0.875rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: background 0.2s, color 0.2s;
    }

    .why-toggle:hover {
      background: #1e293b;
      color: #e2e8f0;
    }

    .why-toggle::before {
      content: '▶';
      font-size: 0.75rem;
      transition: transform 0.2s;
    }

    .why-toggle.open::before {
      transform: rotate(90deg);
    }

    .why-content {
      display: none;
      padding: 1rem;
      background: #0f172a;
      border-top: 1px solid #334155;
    }

    .why-content.open {
      display: block;
    }

    .what-section {
      margin-bottom: 0.5rem;
    }

    .input-container {
      padding: 1rem 2rem;
      background: #1e293b;
      border-top: 1px solid #334155;
      display: flex;
      gap: 1rem;
    }

    #question {
      flex: 1;
      padding: 1rem;
      border: 1px solid #334155;
      border-radius: 0.5rem;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 1rem;
      outline: none;
    }

    #question:focus {
      border-color: #3b82f6;
    }

    button {
      padding: 1rem 2rem;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 0.5rem;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #2563eb;
    }

    button:disabled {
      background: #475569;
      cursor: not-allowed;
    }

    .loading {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .loading::after {
      content: '';
      width: 1rem;
      height: 1rem;
      border: 2px solid #3b82f6;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .welcome {
      text-align: center;
      color: #64748b;
      padding: 4rem 2rem;
    }

    .welcome h2 {
      color: #94a3b8;
      margin-bottom: 1rem;
    }

    .welcome p {
      margin-bottom: 2rem;
    }

    .examples {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
    }

    .example {
      background: #1e293b;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .example:hover {
      background: #334155;
    }
  </style>
</head>
<body>
  <header>
    <h1>📊 Leadership Autopilot</h1>
    <div class="status">
      <div class="status-item" id="gl-status">GL: —</div>
      <div class="status-item" id="week-status">Week: —</div>
      <button onclick="resetSession()" style="padding: 0.5rem 1rem; font-size: 0.875rem;">Reset</button>
    </div>
  </header>

  <div class="chat-container" id="chat">
    <div class="welcome">
      <h2>Welcome to Leadership Autopilot</h2>
      <p>Ask questions about your WBR data. I'll analyze metrics and find root causes.</p>
      <div class="examples">
        <div class="example" onclick="askQuestion('Why did PC GMS grow this week?')">Why did PC GMS grow?</div>
        <div class="example" onclick="askQuestion('What drove the margin decline in PC?')">What drove margin decline?</div>
        <div class="example" onclick="askQuestion('Go deeper on LCD monitors')">Deep dive monitors</div>
        <div class="example" onclick="askQuestion('Summarize the week across all GLs')">Weekly summary</div>
      </div>
    </div>
  </div>

  <div class="input-container">
    <input type="text" id="question" placeholder="Ask a question..." onkeypress="handleKeyPress(event)">
    <button onclick="ask()" id="submit-btn">Ask</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const chatContainer = document.getElementById('chat');
    const questionInput = document.getElementById('question');
    const submitBtn = document.getElementById('submit-btn');
    const glStatus = document.getElementById('gl-status');
    const weekStatus = document.getElementById('week-status');

    let sessionId = 'web-' + Date.now();
    let isLoading = false;

    async function ask() {
      const question = questionInput.value.trim();
      if (!question || isLoading) return;

      // Clear welcome message on first question
      if (chatContainer.querySelector('.welcome')) {
        chatContainer.innerHTML = '';
      }

      // Add user message
      addMessage(question, 'user');
      questionInput.value = '';

      // Show loading
      isLoading = true;
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="loading">Analyzing</span>';

      // Create placeholder for streaming response
      const responseDiv = document.createElement('div');
      responseDiv.className = 'message assistant';
      responseDiv.innerHTML = '<span class="loading">Thinking</span>';
      chatContainer.appendChild(responseDiv);
      chatContainer.scrollTop = chatContainer.scrollHeight;

      let fullText = '';

      try {
        const response = await fetch('/api/ask/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question, sessionId }),
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value);
          const lines = chunk.split('\n');

          for (const line of lines) {
            if (line.startsWith('data: ')) {
              try {
                const data = JSON.parse(line.slice(6));
                
                if (data.type === 'content') {
                  fullText += data.text;
                  renderStreamingResponse(responseDiv, fullText);
                } else if (data.type === 'done') {
                  updateStatus(data.gl, data.week);
                } else if (data.type === 'error') {
                  responseDiv.innerHTML = 'Error: ' + data.error;
                }
              } catch (e) {
                // Skip malformed JSON
              }
            }
          }
        }

        // Final render with full formatting
        renderFinalResponse(responseDiv, fullText);

      } catch (error) {
        responseDiv.innerHTML = 'Error: ' + error.message;
      }

      isLoading = false;
      submitBtn.disabled = false;
      submitBtn.textContent = 'Ask';
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function renderStreamingResponse(div, text) {
      // Check if we have WHAT section complete
      const whatMatch = text.match(/\*\*WHAT:\*\*([\s\S]*?)(?=\*\*WHY:\*\*|$)/i);
      
      if (whatMatch) {
        const whatContent = whatMatch[1].trim();
        const hasWhy = text.includes('**WHY:**');
        
        let html = `<div class="what-section">${marked.parse(whatContent)}</div>`;
        
        if (hasWhy) {
          const whyContent = text.split('**WHY:**')[1] || '';
          html += `
            <div class="why-section">
              <button class="why-toggle" onclick="toggleWhy(this)">Show reasoning (WHY)</button>
              <div class="why-content">
                <span class="loading">Loading details</span>
                ${marked.parse(whyContent)}
              </div>
            </div>
          `;
        }
        
        div.innerHTML = html;
      } else {
        // No WHAT/WHY format yet, just show raw
        div.innerHTML = marked.parse(text);
      }
      
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function renderFinalResponse(div, text) {
      // Check for WHAT/WHY format
      const whatWhyMatch = text.match(/\*\*WHAT:\*\*([\s\S]*?)\*\*WHY:\*\*([\s\S]*)/i);
      
      if (whatWhyMatch) {
        const whatContent = whatWhyMatch[1].trim();
        const whyContent = whatWhyMatch[2].trim();
        
        div.innerHTML = `
          <div class="what-section">
            ${marked.parse(whatContent)}
          </div>
          <div class="why-section">
            <button class="why-toggle" onclick="toggleWhy(this)">Show reasoning (WHY)</button>
            <div class="why-content">
              ${marked.parse(whyContent)}
            </div>
          </div>
        `;
      } else {
        div.innerHTML = marked.parse(text);
      }
    }

    function addMessage(content, type) {
      const div = document.createElement('div');
      div.className = `message ${type}`;
      
      if (type === 'assistant') {
        // Check for WHAT/WHY format
        const whatWhyMatch = content.match(/\*\*WHAT:\*\*([\s\S]*?)\*\*WHY:\*\*([\s\S]*)/i);
        
        if (whatWhyMatch) {
          const whatContent = whatWhyMatch[1].trim();
          const whyContent = whatWhyMatch[2].trim();
          
          div.innerHTML = `
            <div class="what-section">
              ${marked.parse(whatContent)}
            </div>
            <div class="why-section">
              <button class="why-toggle" onclick="toggleWhy(this)">Show reasoning (WHY)</button>
              <div class="why-content">
                ${marked.parse(whyContent)}
              </div>
            </div>
          `;
        } else {
          div.innerHTML = marked.parse(content);
        }
      } else {
        div.textContent = content;
      }
      
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function toggleWhy(btn) {
      btn.classList.toggle('open');
      const content = btn.nextElementSibling;
      content.classList.toggle('open');
      btn.textContent = btn.classList.contains('open') ? 'Hide reasoning (WHY)' : 'Show reasoning (WHY)';
    }

    function updateStatus(gl, week) {
      glStatus.textContent = `GL: ${gl ? gl.toUpperCase() : '—'}`;
      glStatus.className = 'status-item' + (gl ? ' active' : '');
      weekStatus.textContent = `Week: ${week || '—'}`;
    }

    function handleKeyPress(e) {
      if (e.key === 'Enter') ask();
    }

    function askQuestion(q) {
      questionInput.value = q;
      ask();
    }

    async function resetSession() {
      await fetch(`/api/session/${sessionId}/reset`, { method: 'POST' });
      chatContainer.innerHTML = `
        <div class="welcome">
          <h2>Session Reset</h2>
          <p>Ask a new question to begin analysis.</p>
        </div>
      `;
      updateStatus(null, null);
    }

    // Load initial status
    fetch('/api/weeks').then(r => r.json()).then(data => {
      if (data.weeks && data.weeks[0]) {
        weekStatus.textContent = `Week: ${data.weeks[0]}`;
      }
    });
  </script>
</body>
</html>
